const HIDE_STORE_KEY = "tags_hidden_ids_v1";
function loadHiddenIds() {
  try {
    const raw = localStorage.getItem(HIDE_STORE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    hiddenIds = new Set(Array.isArray(arr) ? arr : []);
  } catch {
    hiddenIds = new Set();
  }
}
function saveHiddenIds() {
  try {
    localStorage.setItem(HIDE_STORE_KEY, JSON.stringify([...hiddenIds]));
  } catch {}
}

function isTagHidden(tag) {
  return !!tag?.id && hiddenIds.has(tag.id);
}

function setTagHidden(tag, hidden) {
  if (!tag?.id) return;
  if (hidden) hiddenIds.add(tag.id);
  else hiddenIds.delete(tag.id);
  saveHiddenIds();
}

let openccT2S = null;
let openccS2T = null;

function initOpenCC() {
  if (typeof OpenCC === "undefined") {
    console.warn("OpenCC not loaded");
    return false;
  }
  // 用詞在地化你可自行調整：
  // s2t/t2s: 偏字形；twp/cn: 偏台灣<->大陸用語
  openccT2S = OpenCC.Converter({ from: "twp", to: "cn" });
  openccS2T = OpenCC.Converter({ from: "cn", to: "twp" });
  return true;
}

function isHtmlTagString(s) {
  // 只要含有 <...> 就視為 HTML（避免轉換壞掉）
  return typeof s === "string" && /<[^>]+>/.test(s);
}

function toDisplayZh(text) {
  if (typeof text !== "string") return text;

  // 有 HTML 的一律不轉（包含你塞的 <img> / <iframe> / wordmarks 等）
  if (isHtmlTagString(text)) return text;

  // 沒初始化就原樣
  if (!openccT2S || !openccS2T) return text;

  // zhMode="hans" => 顯示簡體；"hant" => 顯示繁體
  return (zhMode === "hant") ? openccS2T(text) : openccT2S(text);
}

function setZhMode(next) {
  zhMode = next === "hant" ? "hant" : "hans";
  try { localStorage.setItem("zhMode", zhMode); } catch {}
  const btn = document.getElementById("zhToggleBtn");
  if (btn) btn.textContent = zhMode === "hans" ? "简→繁" : "繁→简";
  renderTags(); // 你本來就會重繪整個 taglist
}

    function generateTagId() {
      const now = new Date();

      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const millis = String(now.getMilliseconds()).padStart(3, '0');

      return `${year}${month}${day}${hours}${minutes}${seconds}${millis}`;
    }


    function addTag(tag) {

      if (lowerCaseTag && !tagNames.has(lowerCaseTag)) {
const now = new Date().toISOString();
const newTag = {

};
        // If tag length > 500, just add the main tag

// 判斷 t.name 是否為「純 img tag」（整段只有 <img ...>，前後允許空白）
// 特色：不跑整段 regex；只掃前 200 字元，避免 t.name 很大造成卡頓
function isPureImgTagName(name) {
  if (typeof name !== "string") return false;
  const s = name.trim();
  if (s.length < 5) return false;              // "<img>" 最少也要 5
  if (s[0] !== "<" || s[s.length - 1] !== ">") return false;

  // 限制只檢查前面一小段，通常足夠判斷是不是 <img ...>
  const head = s.slice(0, 200).toLowerCase();
  if (!head.startsWith("<img")) return false;

  // 避免 <image ...> 這類：<img 後面不能接英數（等同於 \b 的效果之一）
  const c = head[4]; // '<'0 'i'1 'm'2 'g'3 -> 下一個字元 index 4
  if (c && /[a-z0-9]/.test(c)) return false;

  // 如果你想更嚴格，也可以要求 head 內有 '>' 才算（但不一定在前200內）
  return true;
}

function getSplitTags(uniqueTags) {

  if (_cachedUniqueTagsRef === uniqueTags) return _cachedSplit;

  _cachedUniqueTagsRef = uniqueTags;

    if (isPureImgTagName(name)) imgTags.push(t);
    else textTags.push(t);

  _cachedSplit = { imgTags, textTags };
  return _cachedSplit;
}

}

function tokenize(input) {
  const tokens = [];
  let i = 0;

  const isOp = (c) => c === '|' || c === ',' || c === '(' || c === ')';

  while (i < input.length) {
    while (i < input.length && /\s/.test(input[i])) i++;
    if (i >= input.length) break;

    const ch = input[i];

    // operators
    if (isOp(ch)) {
      tokens.push({ type: 'op', value: ch });
      i++;
      continue;
    }

    // quoted phrase
    if (ch === '"' || ch === "'") {
      const quote = ch;
      i++;
      let buf = '';
      while (i < input.length && input[i] !== quote) {
        if (input[i] === '\\' && i + 1 < input.length) {
          buf += input[i + 1];
          i += 2;
        } else {
          buf += input[i];
          i++;
        }
      }
      if (i < input.length && input[i] === quote) i++;
      tokens.push({ type: 'term', value: buf });
      continue;
    }

    // normal token (can include leading '-' here; parser will handle)
    let buf = '';
    while (i < input.length && !/\s/.test(input[i]) && !isOp(input[i])) {
      buf += input[i];
      i++;
    }
    if (buf.length) tokens.push({ type: 'term', value: buf });
  }

  return tokens;
}
function extractTermsFromQuery(q) {
  const tokens = tokenize(String(q || ""));
  const out = [];

  for (const t of tokens) {
    if (t.type !== "term") continue;

    let v = String(t.value || "").trim();
    if (!v) continue;

    v = v.replace(/^-+/, "").trim();
    v = v.replace(/[(),|]/g, "").trim();   // ✅ 清掉括號等殘留
    if (!v) continue;

    out.push(v.toLowerCase());
  }

  return [...new Set(out)];
}

function buildRelatedSentencesWithPercentList(fullText, query) {
  const text = String(fullText || "");
  const q = String(query || "").trim();
  if (!text.trim() || !q) return [];

  const terms = extractTermsFromQuery(q); // 你現有函式：會處理 | , () 及去重
  if (!terms.length) return [];

  const re = new RegExp(terms.map(escapeRegExpLite).join("|"), "gi");

  const ranges = [];
  let m;
  let safety = 0;

  while ((m = re.exec(text)) !== null) {
    const hitIndex = m.index;
    const [sentStart, sentEnd] = findSentenceRange(text, hitIndex);
    if (sentEnd > sentStart) ranges.push([sentStart, sentEnd]);

    if (m.index === re.lastIndex) re.lastIndex++;
    safety++;
    if (safety > 5000) break; // 防爆：避免極端內容卡死
  }

  if (!ranges.length) return [];

  // merge overlapping sentence ranges
  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [];
  for (const [a, b] of ranges) {
    const last = merged[merged.length - 1];
    if (!last || a > last[1]) merged.push([a, b]);
    else last[1] = Math.max(last[1], b);
  }

  const L = Math.max(1, text.length);

  // build list items
  return merged.map(([start, end], idx) => {
    const sentence = text.slice(start, end).trim();
    const pct = (start / L) * 100;

    return {
      index: idx + 1,
      start,
      end,
      percent: pct, // number
      sentence
    };
  }).filter(x => x.sentence);
}

function formatRelatedPercentListForClipboard(items) {
  if (!items || !items.length) return "";
  return items.map(it => {
    const p = it.percent.toFixed(1).padStart(5, " "); // e.g. " 12.3"
    // 你要更精確可以改 toFixed(2)
    return `[${p}%] ${it.sentence}`;
  }).join("\n\n");
}

  if (!terms.length) return;

  const unionReSrc = terms.map(escapeRegExpLite).join("|");
  const testRe = new RegExp(unionReSrc, "i");

  const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while (walker.nextNode()) {
    const node = walker.currentNode;
    const p = node.parentElement;
    if (!p) continue;

    // skip script/style + already highlighted
    const tag = p.tagName.toLowerCase();
    if (tag === "script" || tag === "style") continue;
    if (p.closest(".highlighttext")) continue;

    if (testRe.test(node.nodeValue)) nodes.push(node);
  }

  for (const node of nodes) {
    const text = node.nodeValue;
    if (!text) continue;

    const re = new RegExp(unionReSrc, "gi");
    const frag = document.createDocumentFragment();
    let last = 0;
    let m;

    while ((m = re.exec(text)) !== null) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));

      const span = document.createElement("span");
      span.className = "highlighttext";
      span.style.background = "#fff37a";
      span.textContent = m[0];
      frag.appendChild(span);

      last = m.index + m[0].length;
      if (m.index === re.lastIndex) re.lastIndex++;

    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));

// 判斷某位置是否在句子邊界字元上
function isSentenceBoundaryChar(ch) {
  // 覆蓋中英常見句末標點 + 換行
  return ch === "。" || ch === "．" || ch === "." ||
         ch === "！" || ch === "!" ||
         ch === "？" || ch === "?" ||
         ch === "\n" || ch === "\r";
}

// 由 match index 找到「所在句子」的 [start, end) 範圍（不含句末標點可自行調整）
function findSentenceRange(text, index) {
  const s = String(text || "");
  const n = s.length;
  let left = Math.max(0, Math.min(index, n));

  // 往左找上一個邊界
  let start = 0;
  for (let i = left - 1; i >= 0; i--) {
    if (isSentenceBoundaryChar(s[i])) {
      start = i + 1;
      break;
    }
  }

  // 往右找下一個邊界
  let end = n;
  for (let i = left; i < n; i++) {
    if (isSentenceBoundaryChar(s[i])) {
      end = i; // 不含標點；如果想包含標點，用 end = i + 1
      break;
    }
  }

  // trim 左右空白（避免片段開頭一堆空格）
  while (start < end && /\s/.test(s[start])) start++;
  while (end > start && /\s/.test(s[end - 1])) end--;

  return [start, end];
}

function splitTextIntoChunksNoCut(text, chunkSize = 10000) {
  const chunks = [];
  let i = 0;

  while (i < text.length) {
    let end = i + chunkSize;
    if (end < text.length) {
      const nextBreak = text.slice(end).search(/[\s.,!?;:"'，。！？；：「」【】]/);
      if (nextBreak >= 0 && nextBreak < 200) {
        end = end + nextBreak + 1;
      } else {
        const prevBreak = text.slice(i, end).lastIndexOf(" ");
        if (prevBreak > 0) end = i + prevBreak + 1;
      }
    }
    chunks.push(text.slice(i, end));
    i = end;
  }
  return chunks;

function buildRelatedSnippetsChunks(text, terms, contextLen = 50, chunkLimit = 10000) {
  const t = String(text || "");
  if (!t.trim() || !terms || !terms.length) return [];

  const termRe = new RegExp(terms.map(escapeRegExpLite).join("|"), "gi");

  const ranges = [];
  let m;
  while ((m = termRe.exec(t)) !== null) {
    const start = Math.max(0, m.index - contextLen);
    const end = Math.min(t.length, m.index + m[0].length + contextLen);
    ranges.push([start, end]);
    if (m.index === termRe.lastIndex) termRe.lastIndex++;
  }
  if (!ranges.length) return [];

  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [ranges[0]];
  for (let i = 1; i < ranges.length; i++) {
    const [s, e] = ranges[i];
    const last = merged[merged.length - 1];
    if (s <= last[1]) last[1] = Math.max(last[1], e);
    else merged.push([s, e]);
  }

  const snippets = merged.map(([s, e]) => t.slice(s, e).trim()).filter(Boolean);
  const joined = snippets.join(" … ");

  // 再切成 load more chunk
  const chunks = [];
  for (let i = 0; i < joined.length; i += chunkLimit) {
    chunks.push(joined.slice(i, i + chunkLimit));
  }
  return chunks;
}
/**
 * related: 命中句子 + 前後 contextChars 字
 * - allTerms: 已 lowercased 的 terms array（你 buildHighlightHTML 已有）
 */
function buildRelatedSentenceWithContext(text, allTerms, contextChars = 50, maxHits = 30) {
  const s = String(text || "");
  if (!s.trim() || !allTerms?.length) return "";

  // OR 命中任何 term
  const re = new RegExp(allTerms.map(escapeRegExpLite).join("|"), "gi");

  const ranges = [];
  let m;
  let hits = 0;

  while ((m = re.exec(s)) !== null) {
    hits++;
    const hitIndex = m.index;

    const [sentStart, sentEnd] = findSentenceRange(s, hitIndex);

    const start = Math.max(0, sentStart - contextChars);
    const end = Math.min(s.length, sentEnd + contextChars);

    ranges.push([start, end]);

    if (m.index === re.lastIndex) re.lastIndex++;
    if (hits >= maxHits) break;
  }

  if (!ranges.length) return "";

  // merge overlaps
  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [];
  for (const [a, b] of ranges) {
    const last = merged[merged.length - 1];
    if (!last || a > last[1]) merged.push([a, b]);
    else last[1] = Math.max(last[1], b);
  }

  // build output
  return merged.map(([a, b]) => {
    const leftEll = a > 0 ? "…" : "";
    const rightEll = b < s.length ? "…" : "";
    return leftEll + s.slice(a, b) + rightEll;
  }).join("\n");
}

     * - Prevents breaking numeric decimals (2.4)
     * - Repairs misplaced newlines in quotes and parentheses
     * - Inserts blank lines before numbered sections (e.g., "11. Summary")
     */
    const formatParagraphs = str => {

       * STEP 0 · Protect quoted text blocks
       * ------------------------------------------------------------- */
      const quotes = [];

      let result = str

       * ------------------------------------------------------------- */
      result = result
        .replace(/([！？!?。\.])\n(?=[」』"')])/g, "$1") // merge quote punctuation
        .replace(/\n{3,}/g, "\n\n");

      /* -------------------------------------------------------------
       * STEP 4 · Healing fixes (decimals, abbreviations, parentheses)
       * ------------------------------------------------------------- */
      result = result

        .replace(/\b(u)\.\s*[\n\s]*s\.\s*[\n\s]*a\./gi, "U.S.A.")
        .replace(/\b(u)\.\s*[\n\s]*k\./gi, "U.K.")

      result = result

    const englishWords = words.filter(w => /^[A-Za-z]+$/.test(w));
    const isAllEnglishWords = englishWords.length === words.length;

    if (!isAllEnglishWords) {
      // 含非英文（符號、數字、中文等）→ 當句子/雜項，維持原順序放底部
      sentenceTags.push(tag);
      continue;
    }

    // 句子判斷：英文單字數 >= sentenceMinWords → 放到底部
    if (englishWords.length >= sentenceMinWords) {
      sentenceTags.push(tag);
    } else {
      // 字數 < sentenceMinWords：可以排序（可能是 1 個字，或你設定成 3 時的 2 個字）
      sortableTags.push(tag);
    }
  }

  // 3) 計算每個 sortable tag 的分數
  //    - 若只有 1 個字：用該字的詞頻
  //    - 若是多字（例如你設定 sentenceMinWords=3，2字也會進來）：用「各字詞頻總和」
  const scoredSortable = sortableTags.map(tag => {
    const ws = tag.name
      .trim()
      .toLowerCase()
      .split(/\s+/)
      .filter(w => /^[a-z]+$/.test(w));

    const score = ws.reduce((sum, w) => sum + (freq[w] || 0), 0);
    return { tag, score };
  });

  // 4) 排序
  scoredSortable.sort((a, b) =>
    order === 'desc' ? b.score - a.score : a.score - b.score
  );

  // 5) 合併：sortable 在前、句子在後（句子維持原順序）
  const newList = [...scoredSortable.map(s => s.tag), ...sentenceTags];

  // 6) 更新顯示
  tagList.splice(0, tagList.length, ...newList);
  renderTags();

  showSnackbar(
    `✅ Sorted by ${order === 'desc' ? 'most common' : 'rarest'} English words. ` +
    `Sentences (>= ${sentenceMinWords} words) moved to bottom.`
  );
}

    // === 回復原始標籤狀態 ===
    function resetTagListToOriginal() {
      if (!originalTagList || originalTagList.length === 0) {
        showSnackbar('⚠️ No original state saved yet!');
        return;
      }

      // 確認有資料
      tagList.splice(0, tagList.length, ...JSON.parse(JSON.stringify(originalTagList)));

      renderTags();
      showSnackbar('✅ Restored to original state');
      console.log('Tag list restored to original state.');
    }

function escapeRegExp(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}


// 只在“不是字母/数字/下划线”的位置作为边界（等价于 \b 但更可控）
function makeBoundaryPattern(raw) {
  const esc = escapeRegExp(raw);
  // 左边不是 \w，右边也不是 \w（或到达字符串边界）
  return `(?<!\\w)${esc}(?!\\w)`;
}

function replaceTextWithWordmarksInElement(root) {
  const keys = Object.keys(WORDMARKS)
    .map(k => k.trim())
    .filter(Boolean)
    .sort((a, b) => b.length - a.length);

  if (!keys.length) return;

  // 给每个 key 加边界，避免 app 命中 apple/apps
  const re = new RegExp(keys.map(makeBoundaryPattern).join("|"), "gi");

  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);

  for (const node of nodes) {
    const text = node.nodeValue;
    if (!text) continue;

    re.lastIndex = 0;
    if (!re.test(text)) continue;
    re.lastIndex = 0;

    const frag = document.createDocumentFragment();
    let last = 0, m;

    while ((m = re.exec(text)) !== null) {
      const found = m[0];
      const key = found.trim().toLowerCase();
      const src = WORDMARKS[key];

      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));

      if (src) {
        const img = document.createElement("img");
        img.className = "wordmark-img";
        img.src = src;
        img.alt = key;
        img.loading = "lazy";
        img.decoding = "async";
        img.style.zoom = "110%"; // or "1.5"
        img.style.borderRadius = "1%";
        frag.appendChild(img);
      } else {
        frag.appendChild(document.createTextNode(found));
      }

      last = m.index + found.length;
    }

    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));

    node.parentNode.replaceChild(frag, node);
  }
  
}


function enableTiltForAllImages(root = document) {
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  const maxDeg = 10;
  const delayMs = 1000;

  let hoverImg = null;   // 目前游標所在的 img（用於判斷2秒）
  let armedImg = null;   // 目前允許 tilt 的 img
  let timer = null;

  const getImg = (el) => el && el.closest && el.closest("img");

  function clearTimer() {
    if (timer) {
      clearTimeout(timer);
      timer = null;
    }
  }

  function setTilt(img, clientX, clientY) {
    const rect = img.getBoundingClientRect();
    if (!rect.width || !rect.height) return;

    const x = (clientX - rect.left) / rect.width;
    const y = (clientY - rect.top) / rect.height;

    const ry = (x - 0.5) * (maxDeg * 2);
    const rx = -(y - 0.5) * (maxDeg * 2);

    img.style.setProperty("--rx", clamp(rx, -maxDeg, maxDeg) + "deg");
    img.style.setProperty("--ry", clamp(ry, -maxDeg, maxDeg) + "deg");
  }

  // 用 pointerover 來「開始2秒倒數」
  root.addEventListener("pointerover", (e) => {
    const img = getImg(e.target);
    if (!img) return;

    // 在同一張圖的子元素間移動，不要重新倒數
    const from = getImg(e.relatedTarget);
    if (from === img) return;

    hoverImg = img;
    armedImg = null;
    clearTimer();

    timer = setTimeout(() => {
      if (hoverImg === img) armedImg = img;
    }, delayMs);
  });

  // 不用 pointerout reset，但要在「游標離開整張圖」時取消倒數
  // 這裡用 pointermove 檢查：若移到非 hoverImg，就取消 hoverImg（避免倒數完成錯誤啟用）
  root.addEventListener("pointermove", (e) => {
    const imgNow = getImg(e.target);

    // 如果已經離開原本 hoverImg，停止倒數（但不reset角度）
    if (hoverImg && imgNow !== hoverImg) {
      hoverImg = null;
      clearTimer();
    }

    // 只有 armed 的那張，且游標真的在那張上，才更新 tilt
    if (armedImg && imgNow === armedImg) {
      setTilt(armedImg, e.clientX, e.clientY);
    }
  });

  // 觸控：通常不延遲（你要延遲也能加）
  root.addEventListener(
    "touchmove",
    (e) => {
      const t = e.touches[0];
      if (!t) return;
      const img = getImg(e.target);
      if (!img) return;
      setTilt(img, t.clientX, t.clientY);
    },
    { passive: true }
  );
}

function enableImageZoom(root = document, options = {}) {
  const opts = {
    // zoom strength
    zoom: 2.5,           // final zoom scale
    wheelStep: 0.25,
    maxZoom: 6,
    // if true: click toggles zoom in/out
    toggleOnClick: true,
    ...options,
  };

  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

  function ensureZoomWrapper(img) {
    // Wrap only once so we can clip the zoomed image inside original area
    if (img.parentElement && img.parentElement.classList.contains("img-zoom-wrap")) {
      return img.parentElement;
    }

    const wrap = document.createElement("span");
    wrap.className = "img-zoom-wrap";
    wrap.style.position = "relative";
    wrap.style.display = "inline-block";
    wrap.style.overflow = "hidden";       // IMPORTANT: clip inside original area
    wrap.style.lineHeight = "0";
    wrap.style.touchAction = "none";      // allow touch move w/out page scroll in area

    // Preserve layout size: wrapper adopts the rendered size of the image
    const rect = img.getBoundingClientRect();
    wrap.style.width = rect.width + "px";
    wrap.style.height = rect.height + "px";

    // Insert wrapper around img
    img.parentNode.insertBefore(wrap, img);
    wrap.appendChild(img);

    // Make image fill the wrapper so transforms stay inside
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = img.style.objectFit || "cover";
    img.style.transformOrigin = "0 0";
    img.style.willChange = "transform";
    img.style.display = "block";

    // Re-sync wrapper size on load (important if image hadn't loaded yet)
    if (!img.complete) {
      img.addEventListener(
        "load",
        () => {
          const r = img.getBoundingClientRect();
          wrap.style.width = r.width + "px";
          wrap.style.height = r.height + "px";
        },
        { once: true }
      );
    }

    return wrap;
  }

  function setZoomAtPoint(img, clientX, clientY, nextScale) {
    const wrap = ensureZoomWrapper(img);
    const rect = wrap.getBoundingClientRect();

    const x = clientX - rect.left; // point inside wrapper
    const y = clientY - rect.top;

    const w = rect.width;
    const h = rect.height;

    nextScale = clamp(nextScale, 1, opts.maxZoom);

    // Translate so the clicked point stays under the cursor:
    // transform = translate(tx, ty) scale(s)
    // For origin 0,0:
    // tx = x - x*s
    // ty = y - y*s
    let tx = x - x * nextScale;
    let ty = y - y * nextScale;

    // Clamp translation so image always covers the wrapper (no empty gaps)
    const minTx = w - w * nextScale; // negative
    const minTy = h - h * nextScale;
    tx = clamp(tx, minTx, 0);
    ty = clamp(ty, minTy, 0);

    img.dataset.zoomScale = String(nextScale);
    img.dataset.zoomTx = String(tx);
    img.dataset.zoomTy = String(ty);

    img.style.transform = `translate(${tx}px, ${ty}px) scale(${nextScale})`;
    img.classList.add("is-zoomed");
  }

  function resetZoom(img) {
    img.dataset.zoomScale = "1";
    img.dataset.zoomTx = "0";
    img.dataset.zoomTy = "0";
    img.style.transform = "translate(0px, 0px) scale(1)";
    img.classList.remove("is-zoomed");
  }

  // Click to zoom into the clicked point (inside original image area)
  root.addEventListener("click", (e) => {
    const img = e.target.closest && e.target.closest("img");
    if (!img) return;
    if (img.dataset.noZoom === "true") return;

    ensureZoomWrapper(img);

    const isZoomed = img.classList.contains("is-zoomed");

    if (opts.toggleOnClick && isZoomed) {
      resetZoom(img);
      return;
    }

    setZoomAtPoint(img, e.clientX, e.clientY, opts.zoom);
  });

  // Mouse move (when zoomed) to "pan" within the original area by moving the focus point
  root.addEventListener("mousemove", (e) => {
    const img = e.target.closest && e.target.closest("img");
    if (!img || !img.classList.contains("is-zoomed")) return;

    const currentScale = parseFloat(img.dataset.zoomScale || "1") || 1;
    setZoomAtPoint(img, e.clientX, e.clientY, currentScale);
  });

  // Wheel zoom in/out at pointer (still clipped inside image area)
  root.addEventListener(
    "wheel",
    (e) => {
      const img = e.target.closest && e.target.closest("img");
      if (!img) return;
      if (img.dataset.noZoom === "true") return;

      // Only wheel-zoom when already zoomed (so normal page scroll still works)
      if (!img.classList.contains("is-zoomed")) return;

      e.preventDefault();

      const current = parseFloat(img.dataset.zoomScale || "1") || 1;
      const direction = Math.sign(e.deltaY);
      const next = current + (direction > 0 ? -opts.wheelStep : opts.wheelStep);

      if (next <= 1.001) {
        resetZoom(img);
        return;
      }

      setZoomAtPoint(img, e.clientX, e.clientY, next);
    },
    { passive: false }
  );

  // Touch support: move finger to pan focus point
  root.addEventListener(
    "touchmove",
    (e) => {
      const t = e.touches[0];
      if (!t) return;

      const img = e.target.closest && e.target.closest("img");
      if (!img || !img.classList.contains("is-zoomed")) return;

      const currentScale = parseFloat(img.dataset.zoomScale || "1") || 1;
      setZoomAtPoint(img, t.clientX, t.clientY, currentScale);
    },
    { passive: true }
  );

  // Optional: reset zoom when leaving the image area
  root.addEventListener(
    "mouseleave",
    (e) => {
      const img = e.target.closest && e.target.closest("img");
      if (!img) return;
      // comment out next line if you don't want auto-reset on leave
      resetZoom(img);
    },
    true
  );

  return { resetZoom };
}

// Restore each tag from its own saved original HTML, then (if on) replace
function applyWordmarksToCurrentTags() {
  const roots = [tagListUl, tagListImgUl, tagListTextUl].filter(Boolean);

  roots.forEach(root => {
    root.querySelectorAll(".tag").forEach(tagEl => {
      const contentEl = tagEl.querySelector(".tag-content") || tagEl.querySelector("li");
      if (!contentEl) return;

      if (!contentEl.dataset.originalHtml) {
        contentEl.dataset.originalHtml = contentEl.innerHTML;
      }
      contentEl.innerHTML = contentEl.dataset.originalHtml;

      if (wordmarksOn) replaceTextWithWordmarksInElement(contentEl);
    });
  });
}
